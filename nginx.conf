server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve pre-compressed .gz files as-is (no Content-Encoding header)
    # so the browser receives raw gzip bytes for our DecompressionStream.
    location ~* \.bin\.gz$ {
        add_header Content-Type application/octet-stream;
        gzip off;
    }

    # Static assets with long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|glb|bin|tga)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
